# ============================================================
#  Lars Financial Dashboard - Configuratie
#  Pas dit bestand aan met jouw eigen gegevens.
# ============================================================

app:
  host: "127.0.0.1"
  port: 5050
  auto_refresh_time: "07:00"

# ── Valuta ───────────────────────────────────────────────────
currency:
  base: "EUR"

# ── Google Sheets ─────────────────────────────────────────────
# Stap 1: Maak een Google Service Account aan (zie README)
# Stap 2: Zet het pad naar het JSON-bestand hieronder
# Stap 3: Vul de spreadsheet IDs in (te vinden in de URL van je sheet)
#
# Voorbeeld URL:
#   https://docs.google.com/spreadsheets/d/1ABC...xyz/edit
#                                          ^^^^^^^^^^^ dit is het ID
google_sheets:
  credentials_file: "~/.lars-dashboard/google_service_account.json"

  spreadsheets:

    bol_com:
      id: "1JCKivj9NHV7RdLk202PgOnCxgBETfPPKkNhP6i_uTd0"
      business_name: "Bol.com Business"
      entity: "BV"
      tab_format: "month_name"   # Tabs zijn maandnamen: "March", "February"
      default_year: 2026
      fixed_cells:
        revenue: "C4"
        gross_margin: "C5"
        gross_margin_pct: "E5"
        nett_margin_product: "C6"
        nett_margin_product_pct: "E6"
        profit: "C7"
        profit_pct: "E7"
        returns: "G5"
        return_pct: "H5"
        non_saleable_costs: "I5"
        storage_cost: "J5"
        recovery_clients: "K5"

    retailers:
      id: "1aMq12e2KbTLDmP1k1_eWgY5jgNtwQreWkfISDK31DYs"
      business_name: "Retailers"
      entity: "BV"
      overview_tab: "Overview"

    hears:
      id: "1tQ4BxJQZI8AEpNjBmJXJ7q5B4J7EwWT6AeJK_VilCeY"
      business_name: "Hears"
      entity: "BV"
      overview_tab: "Overvieuw"

# ── Degiro ────────────────────────────────────────────────────
#
# Stap 1: Sla je Degiro inloggegevens op via Terminal:
#   python3 test_degiro.py --setup
#
# Stap 2: Test de verbinding:
#   python3 test_degiro.py
#
# Als je 2FA (two-factor authentication) hebt ingeschakeld op Degiro,
# heb je ook de TOTP secret key nodig (te vinden bij het instellen van 2FA).
#
degiro:
  credentials_file: "~/.lars-dashboard/degiro_credentials.json"
  cache_ttl_hours: 4   # Ververs elke 4 uur (of bij handmatig vernieuwen)

# ── ING Bank ──────────────────────────────────────────────────
#
# Stap 1: Sla je ING inloggegevens op via Terminal:
#   python3 -c "
#   from backend.connectors.ing_fints import IngFintsConnector
#   IngFintsConnector.create_credentials_file('JOUW_GEBRUIKERSNAAM', 'JOUW_PIN')
#   "
#
# Stap 2: Vul hieronder je IBAN(s) in
# Stap 3: Controleer of FinTS werkt: python3 test_ing.py
#
# Als FinTS NIET werkt met ING NL: gebruik de CSV-import in het dashboard.
# (Exporteer je rekeningafschrift als CSV via Mijn ING)
#
ing:
  # FinTS server instellingen
  # ING Duitsland: fints_server: "https://fints.ing.de/fints", fints_blz: "50010517"
  # ING Nederland: vul in als je het endpoint weet (anders: leeg laten = CSV-import)
  fints_server: ""
  fints_blz: ""
  credentials_file: "~/.lars-dashboard/ing_credentials.json"
  cache_ttl_hours: 4

  # Vul hieronder je ING rekeningen in
  # Zet iban: op je werkelijke IBAN-nummer
  accounts:
    - iban: "VULL_HIER_JE_BETAALREKENING_IBAN_IN"
      label: "ING Betaalrekening"
      category: "cash"       # Opties: cash, savings
    - iban: "VULL_HIER_JE_SPAARREKENING_IBAN_IN"
      label: "ING Spaargeld"
      category: "savings"
    # Voeg meer rekeningen toe indien nodig:
    # - iban: "NL00INGB..."
    #   label: "ING Zakelijk"
    #   category: "cash"

# ── US Supplement Brand ───────────────────────────────────────
# Wordt handmatig ingevoerd via het dashboard
supplement_brand:
  business_name: "US Supplement Brand"
  entity: "LLC"
  currency: "USD"

# ── Juridische entiteiten ─────────────────────────────────────
entities:
  BV:
    full_name: "Rebrain B.V."
    country: "NL"
  Holding:
    full_name: "Lars Holding B.V."
    country: "NL"
  LLC:
    full_name: "Rebrain LLC"
    country: "US"
